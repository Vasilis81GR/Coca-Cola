<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bigman logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2540"/>
      <stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
    <radialGradient id="chomp" cx="42%" cy="38%" r="70%">
      <stop offset="0" stop-color="#FFE55C"/>
      <stop offset="1" stop-color="#F5B700"/>
    </radialGradient>
  </defs>

  <!-- rounded arcade tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- yellow chomper: a full circle with a wedge cut out for the mouth (opens right) -->
  <circle cx="238" cy="256" r="168" fill="url(#chomp)"/>
  <path d="M238 256 L 452 150 L 452 362 Z" fill="url(#bg)"/>

  <!-- eye -->
  <circle cx="214" cy="168" r="24" fill="#0a1020"/>

  <!-- a little pellet it is munching -->
  <circle cx="470" cy="256" r="20" fill="#FFE55C"/>
</svg>
